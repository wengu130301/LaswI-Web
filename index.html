<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaswI AI · 轻量助手</title>
    <style>
        /* 极简重置 + 高级感基调 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #1e1e1e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 导航 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 32px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #555;
        }
        .nav-links a {
            text-decoration: none;
            color: inherit;
            transition: color 0.2s ease;
        }
        .nav-links a:hover {
            color: #000;
        }

        .btn {
            display: inline-block;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 0;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-align: center;
        }
        .btn:hover {
            background-color: #333;
        }

        /* hero */
        .hero {
            text-align: center;
            padding: 40px 0 80px 0;
            max-width: 800px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #000;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        .hero-sub {
            font-size: 1.25rem;
            color: #666;
            margin-bottom: 48px;
            font-weight: 400;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        /* 大logo图片样式 */
        .hero-logo {
            display: block;
            width: 120px;
            height: auto;
            margin: 0 auto 40px auto;
        }
        .hero .btn {
            margin-top: 24px;
            min-width: 200px;
        }

        /* 产品亮点 */
        .features {
            padding: 80px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 60px;
            margin-top: 40px;
        }
        .feature-item {
            text-align: left;
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 1.5rem;
            color: #000;
            border-radius: 8px;
        }
        .feature-item h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #000;
        }
        .feature-item p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* 关于 */
        .about {
            padding: 80px 0 100px 0;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }
        .about-logo {
            display: block;
            width: 56px;
            height: auto;
            margin: 0 auto 24px auto;
        }
        .about-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 16px;
            font-weight: 400;
            line-height: 1.7;
        }
        .about-small {
            color: #999;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            padding-top: 24px;
            margin-top: 24px;
        }

        .footer {
            border-top: 1px solid #f0f0f0;
            padding: 32px 0;
            color: #aaa;
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
            .nav-links {
                gap: 24px;
                flex-wrap: wrap;
            }
            .hero h1 {
                font-size: 3.5rem;
            }
            .features-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .hero-logo {
                width: 100px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div class="container">
        <nav class="navbar">
            <a href="/" class="logo">
                <img src="logo.jpeg" alt="LaswI AI">
            </a>
            <div class="nav-links">
                <a href="#">首页</a>
                <a href="#">产品</a>
                <a href="#">文档</a>
                <a href="#">关于</a>
            </div>
        </nav>
    </div>

    <!-- Hero -->
    <div class="container">
        <div class="hero">
            <img src="logo.jpeg" alt="LaswI AI" class="hero-logo">
            <h1>LaswI AI</h1>
            <div class="hero-sub">轻量、干净、好用的 AI 助手</div>
            <!-- 修改按钮链接 -->
            <a href="https://laswi-ai-production.up.railway.app/" class="btn">开始使用 / 体验 AI</a>
        </div>
    </div>

    <!-- 产品亮点 -->
    <div class="features">
        <div class="container">
            <p style="color: #999; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; margin-bottom: 8px;">为什么选择 LaswI</p>
            <div class="features-grid">
                <div class="feature-item">
                    <div class="feature-icon">◻️</div>
                    <h3>极简界面</h3>
                    <p>无干扰，纯粹对话。设计克制，专注于内容本身。</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⚙️</div>
                    <h3>混元大模型</h3>
                    <p>腾讯混元驱动，强大且稳定的中文理解能力。</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⚡</div>
                    <h3>快速响应</h3>
                    <p>轻量架构，首字低延迟，流畅对话体验。</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 关于 -->
    <div class="container">
        <div class="about">
            <img src="logo.jpeg" alt="LaswI AI" class="about-logo">
            <div class="about-text">
                由 LSW 开发，基于腾讯混元 API。<br>
                专注提供干净、专业的 AI 交互体验。
            </div>
            <div class="about-small">
                © LaswI AI · 极简 · 克制
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <div class="container">
            <span>LaswI AI – 轻量助手</span>
        </div>
    </div>

</body>
</html>
